                </button>

        </div>

            <button class="tab active" data-category="all" onclick="filterDocuments('all')">

            <button class="tab" data-category="rules" onclick="filterDocuments('rules')">
                ⚖️ Rules <span class="tab-badge" id="badge-rules">4</span>
            </button>
            <button class="tab" data-category="cases" onclick="filterDocuments('cases')">
                🏛️ Case Law <span class="tab-badge" id="badge-cases">3</span>
            </button>

        </div>
    </div>

    <div class="modal" id="uploadModal">

                <p class="upload-text">Click to upload or drag and drop</p>
                <p class="upload-hint">PDF, DOC, DOCX, TXT, RTF (Max 25MB)</p>

            </div>
            <div class="form-group">
                <label class="form-label">Document Title</label>
                <input type="text" class="form-input" id="docTitle" placeholder="Enter document title">
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-select" id="docCategory">
                    <option value="statutes">Statutes</option>
                    <option value="rules">Rules</option>
                    <option value="cases">Case Law</option>
                </select>
            </div>
            <button class="submit-btn" onclick="uploadDocument()">Upload Document</button>
        </div>

    <div class="modal viewer-modal" id="viewerModal">

    <script>
        var documents = [
            { id: 1, title: 'Civil Procedure Code 1908', category: 'statutes', type: 'PDF', size: '2.4 MB', date: '2024-01-15', pages: 234 },
            { id: 2, title: 'Pakistan Penal Code 1860', category: 'statutes', type: 'PDF', size: '3.1 MB', date: '2024-01-20', pages: 312 },
            { id: 3, title: 'Contract Act 1872', category: 'statutes', type: 'PDF', size: '1.8 MB', date: '2024-02-01', pages: 156 },
            { id: 4, title: 'Qanun-e-Shahadat Order 1984', category: 'statutes', type: 'PDF', size: '987 KB', date: '2024-02-05', pages: 67 },
            { id: 5, title: 'Transfer of Property Act 1882', category: 'statutes', type: 'PDF', size: '1.5 MB', date: '2024-01-25', pages: 145 },
            { id: 6, title: 'Negotiable Instruments Act 1881', category: 'statutes', type: 'PDF', size: '890 KB', date: '2024-02-10', pages: 89 },
            { id: 7, title: 'Sale of Goods Act 1930', category: 'statutes', type: 'PDF', size: '654 KB', date: '2024-01-18', pages: 78 },
            { id: 8, title: 'Companies Act 2017', category: 'statutes', type: 'PDF', size: '4.2 MB', date: '2024-02-08', pages: 456 },
            { id: 9, title: 'Supreme Court Rules 1980', category: 'rules', type: 'PDF', size: '1.2 MB', date: '2024-01-10', pages: 89 },
            { id: 10, title: 'High Court Rules 1992', category: 'rules', type: 'PDF', size: '1.4 MB', date: '2024-01-22', pages: 102 },
            { id: 11, title: 'Code of Civil Procedure Rules', category: 'rules', type: 'PDF', size: '876 KB', date: '2024-02-03', pages: 67 },
            { id: 12, title: 'Arbitration Rules 2005', category: 'rules', type: 'PDF', size: '543 KB', date: '2024-01-28', pages: 45 },
            { id: 13, title: 'PLD 2023 SC 456', category: 'cases', type: 'PDF', size: '456 KB', date: '2023-11-12', pages: 34 },
            { id: 14, title: 'PLD 2023 SC 567', category: 'cases', type: 'PDF', size: '523 KB', date: '2023-12-05', pages: 41 },
            { id: 15, title: 'PLD 2024 SC 123', category: 'cases', type: 'PDF', size: '398 KB', date: '2024-01-30', pages: 28 }
        ];

        var selectedFiles = [];
        var currentCategory = 'all';

        function renderDocuments() {
            var grid = document.getElementById('documentsGrid');
            var searchQuery = document.getElementById('searchBox').value.toLowerCase();
            
            var filtered = documents.filter(function(doc) {
                var matchesCategory = currentCategory === 'all' || doc.category === currentCategory;
                var matchesSearch = doc.title.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            grid.innerHTML = filtered.map(function(doc) {
                return '<div class="document-card">' +
                    '<div class="doc-icon">' + getDocIcon(doc.type) + '</div>' +
                    '<h3 class="doc-title">' + doc.title + '</h3>' +
                    '<span class="doc-category">' + getCategoryName(doc.category) + '</span>' +
                    '<div class="doc-meta">' +
                        '<span>📄 ' + doc.pages + ' pages</span>' +
                        '<span>💾 ' + doc.size + '</span>' +
                    '</div>' +
                    '<div class="doc-meta">' +
                        '<span>📅 ' + doc.date + '</span>' +
                        '<span>📝 ' + doc.type + '</span>' +
                    '</div>' +
                    '<div class="doc-actions">' +
                        '<button class="action-btn view-btn" onclick="viewDocument(' + doc.id + ')">👁️ View</button>' +
                        '<button class="action-btn download-btn" onclick="downloadDocument(' + doc.id + ')">⬇️ Download</button>' +
                        '<button class="action-btn delete-btn" onclick="deleteDocument(' + doc.id + ')">🗑️ Delete</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function getDocIcon(type) {
            var icons = {
                'PDF': '📕',
                'DOC': '📘',
                'DOCX': '📘',
                'TXT': '📄',
                'RTF': '📃'
            };
            return icons[type] || '📄';
        }

        function getCategoryName(category) {
            var names = {
                'statutes': '📜 Statutes',
                'rules': '⚖️ Rules',
                'cases': '🏛️ Case Law'
            };
            return names[category] || category;
        }

        function filterDocuments(category) {
            currentCategory = category;
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(tab) {
                tab.classList.remove('active');
            });
            document.querySelector('[data-category="' + category + '"]').classList.add('active');
            renderDocuments();
        }

        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
            document.getElementById('fileInput').value = '';
            document.getElementById('docTitle').value = '';
            selectedFiles = [];
        }

        function handleFileSelect(event) {
            selectedFiles = Array.from(event.target.files);
            if (selectedFiles.length > 0) {
                document.getElementById('docTitle').value = selectedFiles[0].name.replace(/\.[^/.]+$/, "");
            }
        }

        function uploadDocument() {
            var title = document.getElementById('docTitle').value;
            var category = document.getElementById('docCategory').value;
            
            if (!title || selectedFiles.length === 0) {
                alert('Please select a file and enter a title');
                return;
            }

            selectedFiles.forEach(function(file) {
                var newDoc = {
                    id: documents.length + 1,
                    title: title,
                    category: category,
                    type: file.name.split('.').pop().toUpperCase(),
                    size: (file.size / 1024).toFixed(0) + ' KB',
                    date: new Date().toISOString().split('T')[0],
                    pages: Math.floor(Math.random() * 200) + 10
                };
                documents.push(newDoc);
            });

            updateBadges();
            renderDocuments();
            closeUploadModal();
            alert('Document(s) uploaded successfully!');
        }

        function updateBadges() {
            document.getElementById('badge-all').textContent = documents.length;
            document.getElementById('badge-statutes').textContent = documents.filter(function(d) { return d.category === 'statutes'; }).length;
            document.getElementById('badge-rules').textContent = documents.filter(function(d) { return d.category === 'rules'; }).length;
            document.getElementById('badge-cases').textContent = documents.filter(function(d) { return d.category === 'cases'; }).length;
        }

        function viewDocument(id) {
            var doc = documents.find(function(d) { return d.id === id; });
            document.getElementById('viewerTitle').textContent = doc.title;
            document.getElementById('viewerModal').classList.add('active');
        }

        function closeViewerModal() {
            document.getElementById('viewerModal').classList.remove('active');
        }

        function downloadDocument(id) {
            var doc = documents.find(function(d) { return d.id === id; });
            alert('Downloading: ' + doc.title);
        }

        function deleteDocument(id) {
            if (confirm('Are you sure you want to delete this document?')) {
                documents = documents.filter(function(d) { return d.id !== id; });
                updateBadges();
                renderDocuments();
            }
        }

        document.getElementById('searchBox').addEventListener('input', renderDocuments);

        renderDocuments();
    </script>
</body>
</html> -->

            align-items: center;
            gap: 8px;
        }

        .tab:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .tab.active {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .tab-badge {
            background: rgba(255, 255, 255, 0.3);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .tab.active .tab-badge {
            background: rgba(255, 255, 255, 0.3);
        }

        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .document-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .document-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .doc-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .doc-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .doc-category {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .doc-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }

        .doc-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .view-btn {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .view-btn:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .download-btn {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
        }

        .download-btn:hover {
            background: rgba(76, 175, 80, 0.2);
        }

        .delete-btn {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
        }

        .delete-btn:hover {
            background: rgba(244, 67, 54, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #333;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: rgba(102, 126, 234, 0.05);
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-input:focus, .form-select:focus {
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .viewer-modal .modal-content {
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .viewer-body {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .viewer-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .viewer-placeholder-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #667eea;
        }

        .document-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            line-height: 1.8;
            color: #333;
            font-size: 1rem;
        }

        .document-content h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .document-content p {
            margin-bottom: 15px;
            text-align: justify;
        }

        .no-documents {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-documents-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .search-container {
                max-width: 100%;
            }

            .documents-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Legal Library</h1>
            <p>Manage and study your legal documents</p>
            <div class="header-actions">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-box" id="searchBox" placeholder="Search documents...">
                </div>
                <button class="upload-btn" onclick="openUploadModal()">
                    📤 Upload Document
                </button>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="tab active" data-category="all" onclick="filterDocuments('all')">
                All Documents <span class="tab-badge" id="badge-all">15</span>
            </button>
            <button class="tab" data-category="statutes" onclick="filterDocuments('statutes')">
                📜 Statutes <span class="tab-badge" id="badge-statutes">8</span>
            </button>
            <button class="tab" data-category="rules" onclick="filterDocuments('rules')">
                ⚖️ Rules <span class="tab-badge" id="badge-rules">4</span>
            </button>
            <button class="tab" data-category="cases" onclick="filterDocuments('cases')">
                🏛️ Case Law <span class="tab-badge" id="badge-cases">3</span>
            </button>
        </div>

        <div class="documents-grid" id="documentsGrid">
        </div>
    </div>

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Upload Document</h2>
                <button class="close-btn" onclick="closeUploadModal()">×</button>
            </div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📄</div>
                <p class="upload-text">Click to upload or drag and drop</p>
                <p class="upload-hint">PDF, DOC, DOCX, TXT, RTF (Max 25MB)</p>
                <input type="file" id="fileInput" style="display: none;" multiple accept=".pdf,.doc,.docx,.txt,.rtf" onchange="handleFileSelect(event)">
            </div>
            <div class="form-group">
                <label class="form-label">Document Title</label>
                <input type="text" class="form-input" id="docTitle" placeholder="Enter document title">
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-select" id="docCategory">
                    <option value="statutes">Statutes</option>
                    <option value="rules">Rules</option>
                    <option value="cases">Case Law</option>
                </select>
            </div>
            <button class="submit-btn" onclick="uploadDocument()">Upload Document</button>
        </div>
    </div>

    <div class="modal viewer-modal" id="viewerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="viewerTitle">Document Viewer</h2>
                <button class="close-btn" onclick="closeViewerModal()">×</button>
            </div>
            <div class="viewer-body" id="viewerBody">
                <div class="viewer-placeholder">
                    <div class="viewer-placeholder-icon">📄</div>
                    <p><strong>No document selected</strong></p>
                    <p style="margin-top: 10px; color: #999;">Select a document to view its content</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        var documents = [];
        var selectedFiles = [];
        var currentCategory = 'all';

        var documentContents = {
            1: '<h2>Civil Procedure Code 1908</h2><p>This Code may be called the Code of Civil Procedure, 1908. It extends to the whole of Pakistan except the Tribal Areas. It shall come into force on the first day of January, 1909.</p><p>The Code contains provisions relating to the jurisdiction of the Courts and their powers, and it regulates the procedure to be followed in suits of a civil nature...</p>',
            2: '<h2>Pakistan Penal Code 1860</h2><p>This Act may be called the Pakistan Penal Code. Every person shall be liable to punishment under this Code and not otherwise for every act or omission contrary to the provisions thereof...</p><p>The Code defines various offenses and prescribes punishments for them, including offenses against the State, public tranquility, human body, property, and more...</p>',
            3: '<h2>Contract Act 1872</h2><p>This Act may be called the Contract Act, 1872. It extends to the whole of Pakistan and applies to all contracts made after the commencement of this Act.</p><p>A contract is an agreement enforceable by law. An agreement enforceable by law is a contract. All agreements are contracts if they are made by the free consent of parties competent to contract...</p>'
        };

        function renderDocuments() {
            var grid = document.getElementById('documentsGrid');
            var searchQuery = document.getElementById('searchBox').value.toLowerCase();
            
            if (documents.length === 0) {
                grid.innerHTML = '<div class="no-documents" style="grid-column: 1 / -1;">' +
                    '<div class="no-documents-icon">📚</div>' +
                    '<p><strong>No documents yet</strong></p>' +
                    '<p style="margin-top: 10px;">Upload your first legal document to get started</p>' +
                '</div>';
                return;
            }
            
            var filtered = documents.filter(function(doc) {
                var matchesCategory = currentCategory === 'all' || doc.category === currentCategory;
                var matchesSearch = doc.title.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-documents" style="grid-column: 1 / -1;">' +
                    '<div class="no-documents-icon">🔍</div>' +
                    '<p><strong>No documents found</strong></p>' +
                    '<p style="margin-top: 10px;">Try adjusting your search or filters</p>' +
                '</div>';
                return;
            }

            grid.innerHTML = filtered.map(function(doc) {
                return '<div class="document-card">' +
                    '<div class="doc-icon">' + getDocIcon(doc.type) + '</div>' +
                    '<h3 class="doc-title">' + doc.title + '</h3>' +
                    '<span class="doc-category">' + getCategoryName(doc.category) + '</span>' +
                    '<div class="doc-meta">' +
                        '<span>📄 ' + doc.pages + ' pages</span>' +
                        '<span>💾 ' + doc.size + '</span>' +
                    '</div>' +
                    '<div class="doc-meta">' +
                        '<span>📅 ' + doc.date + '</span>' +
                        '<span>📝 ' + doc.type + '</span>' +
                    '</div>' +
                    '<div class="doc-actions">' +
                        '<button class="action-btn view-btn" onclick="viewDocument(' + doc.id + ')">👁️ View</button>' +
                        '<button class="action-btn download-btn" onclick="downloadDocument(' + doc.id + ')">⬇️ Download</button>' +
                        '<button class="action-btn delete-btn" onclick="deleteDocument(' + doc.id + ')">🗑️ Delete</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function getDocIcon(type) {
            var icons = {
                'PDF': '📕',
                'DOC': '📘',
                'DOCX': '📘',
                'TXT': '📄',
                'RTF': '📃'
            };
            return icons[type] || '📄';
        }

        function getCategoryName(category) {
            var names = {
                'statutes': '📜 Statutes',
                'rules': '⚖️ Rules',
                'cases': '🏛️ Case Law'
            };
            return names[category] || category;
        }

        function filterDocuments(category) {
            currentCategory = category;
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(tab) {
                tab.classList.remove('active');
            });
            document.querySelector('[data-category="' + category + '"]').classList.add('active');
            renderDocuments();
        }

        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
            document.getElementById('fileInput').value = '';
            document.getElementById('docTitle').value = '';
            selectedFiles = [];
        }

        function handleFileSelect(event) {
            selectedFiles = Array.from(event.target.files);
            if (selectedFiles.length > 0) {
                document.getElementById('docTitle').value = selectedFiles[0].name.replace(/\.[^/.]+$/, "");
            }
        }

        function readFileContent(file, callback) {
            var reader = new FileReader();
            reader.onload = function(e) {
                callback(e.target.result);
            };
            reader.readAsText(file);
        }

        function uploadDocument() {
            var title = document.getElementById('docTitle').value;
            var category = document.getElementById('docCategory').value;
            
            if (!title || selectedFiles.length === 0) {
                alert('Please select a file and enter a title');
                return;
            }

            var uploadCount = 0;
            selectedFiles.forEach(function(file) {
                var newDocId = documents.length + 1;
                var newDoc = {
                    id: newDocId,
                    title: title,
                    category: category,
                    type: file.name.split('.').pop().toUpperCase(),
                    size: (file.size / 1024).toFixed(0) + ' KB',
                    date: new Date().toISOString().split('T')[0],
                    pages: Math.floor(Math.random() * 200) + 10
                };
                documents.push(newDoc);

                if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    readFileContent(file, function(content) {
                        documentContents[newDocId] = '<h2>' + title + '</h2><p>' + content.replace(/\n/g, '</p><p>') + '</p>';
                    });
                } else {
                    documentContents[newDocId] = '<h2>' + title + '</h2><p>This is a ' + file.type + ' file. Content preview is available for text files only.</p><p>File size: ' + newDoc.size + '</p><p>Upload date: ' + newDoc.date + '</p>';
                }

                uploadCount++;
            });

            updateBadges();
            renderDocuments();
            closeUploadModal();
            alert(uploadCount + ' document(s) uploaded successfully!');
        }

        function updateBadges() {
            document.getElementById('badge-all').textContent = documents.length;
            document.getElementById('badge-statutes').textContent = documents.filter(function(d) { return d.category === 'statutes'; }).length;
            document.getElementById('badge-rules').textContent = documents.filter(function(d) { return d.category === 'rules'; }).length;
            document.getElementById('badge-cases').textContent = documents.filter(function(d) { return d.category === 'cases'; }).length;
        }

        function viewDocument(id) {
            var doc = documents.find(function(d) { return d.id === id; });
            document.getElementById('viewerTitle').textContent = doc.title;
            
            var viewerBody = document.getElementById('viewerBody');
            var content = documentContents[id];
            
            if (content) {
                viewerBody.innerHTML = '<div class="document-content">' + content + '</div>';
            } else {
                viewerBody.innerHTML = '<div class="document-content">' +
                    '<h2>' + doc.title + '</h2>' +
                    '<p>Document uploaded successfully. Content preview will be available for text-based files.</p>' +
                    '<p><strong>File Information:</strong></p>' +
                    '<p>Type: ' + doc.type + '</p>' +
                    '<p>Size: ' + doc.size + '</p>' +
                    '<p>Pages: ' + doc.pages + '</p>' +
                    '<p>Date: ' + doc.date + '</p>' +
                '</div>';
            }
            
            document.getElementById('viewerModal').classList.add('active');
        }

        function closeViewerModal() {
            document.getElementById('viewerModal').classList.remove('active');
        }

        function downloadDocument(id) {
            var doc = documents.find(function(d) { return d.id === id; });
            alert('Downloading: ' + doc.title);
        }

        function deleteDocument(id) {
            if (confirm('Are you sure you want to delete this document?')) {
                documents = documents.filter(function(d) { return d.id !== id; });
                updateBadges();
                renderDocuments();
            }
        }

        document.getElementById('searchBox').addEventListener('input', renderDocuments);

        renderDocuments();
    </script>
</body>
</html>
