<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawwise - Notifications & Reminders</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #fff9e6 0%, #ffe8b6 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .notifications-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        .notifications-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #FFD700;
        }
        .notifications-title {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFC700, #FFE066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .back-link {
            color: #FFD700;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
            padding: 10px 20px;
            border-radius: 10px;
        }
        .back-link:hover {
            background: #FFD700;
            color: #333;
        }
        
        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 12px 24px;
            border-radius: 25px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-tab:hover {
            border-color: #FFD700;
            color: #FFD700;
        }
        .filter-tab.active {
            background: linear-gradient(135deg, #FFC700, #FFE066);
            color: #333;
            border-color: transparent;
        }
        .tab-count {
            background: rgba(255,255,255,0.3);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .filter-tab.active .tab-count {
            background: rgba(255,255,255,0.25);
        }
        
        /* Notification List */
        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .notification-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 24px;
            transition: all 0.3s ease;
            border-left: 5px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .notification-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(255, 199, 0, 0.2);
        }
        .notification-card.connection {
            border-left-color: #FFD700;
        }
        .notification-card.deadline {
            border-left-color: #ff6b6b;
        }
        .notification-card.hearing {
            border-left-color: #ffa500;
        }
        .notification-card.accepted {
            border-left-color: #4caf50;
        }
        
        /* Notification Header */
        .notification-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }
        .notification-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .notification-icon.connection {
            background: linear-gradient(135deg, #FFF8E1, #FFECB3);
            color: #FFD700;
        }
        .notification-icon.deadline {
            background: linear-gradient(135deg, #ffe5e5, #ffd5d5);
            color: #ff6b6b;
        }
        .notification-icon.hearing {
            background: linear-gradient(135deg, #fff3e0, #ffe5cc);
            color: #ffa500;
        }
        .notification-icon.accepted {
            background: linear-gradient(135deg, #e8f5e9, #d5ecd6);
            color: #4caf50;
        }
        .notification-content {
            flex: 1;
        }
        .notification-type {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .notification-type.connection { color: #FFD700; }
        .notification-type.deadline { color: #ff6b6b; }
        .notification-type.hearing { color: #ffa500; }
        .notification-type.accepted { color: #4caf50; }
        
        .notification-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .notification-message {
            color: #666;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .notification-details {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 12px;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: #888;
        }
        
        /* Time Badge */
        .notification-time {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f0f0f0;
            color: #666;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        /* Actions */
        .notification-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #f5f5f5;
        }
        .action-btn {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .accept-btn {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
        }
        .accept-btn:hover {
            box-shadow: 0 6px 20px rgba(76,175,80,0.3);
            transform: translateY(-2px);
        }
        .reject-btn {
            background: white;
            color: #e74c3c;
            border: 2px solid #e74c3c;
        }
        .reject-btn:hover {
            background: #e74c3c;
            color: white;
            transform: translateY(-2px);
        }
        .view-btn {
            background: linear-gradient(135deg, #FFC700, #FFE066);
            color: #333;
        }
        .view-btn:hover {
            box-shadow: 0 6px 20px rgba(255, 199, 0, 0.4);
            transform: translateY(-2px);
        }
        
        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 12px;
        }
        .status-badge.accepted {
            background: #e8f5e9;
            color: #4caf50;
        }
        .status-badge.rejected {
            background: #ffebee;
            color: #e74c3c;
        }
        .status-badge.pending {
            background: #fff3e0;
            color: #ffa500;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .empty-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #666;
            margin-bottom: 10px;
        }
        .empty-message {
            font-size: 1.1rem;
        }
        
        /* Urgency Indicator */
        .urgency-indicator {
            position: absolute;
            top: 0;
            right: 0;
            background: #ff6b6b;
            color: white;
            padding: 6px 16px;
            border-radius: 0 16px 0 12px;
            font-size: 0.8rem;
            font-weight: 700;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="notifications-container">
        <div class="notifications-header">
            <div class="notifications-title">🔔 Notifications & Reminders</div>
            <a href="lawyer-dashboard.html" class="back-link">← Dashboard</a>
        </div>
        
        <div class="filter-tabs">
            <div class="filter-tab active" onclick="filterNotifications('all', event)">
                📋 All <span class="tab-count" id="countAll">0</span>
            </div>
            <div class="filter-tab" onclick="filterNotifications('connection', event)">
                🤝 Connections <span class="tab-count" id="countConnection">0</span>
            </div>
            <div class="filter-tab" onclick="filterNotifications('deadline', event)">
                ⏰ Deadlines <span class="tab-count" id="countDeadline">0</span>
            </div>
            <div class="filter-tab" onclick="filterNotifications('hearing', event)">
                ⚖️ Hearings <span class="tab-count" id="countHearing">0</span>
            </div>
        </div>
        
        <div id="notificationList" class="notification-list"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        let allNotifications = [];
        let currentFilter = 'all';
        let loggedInLawyer = null;
        
        try {
            loggedInLawyer = JSON.parse(localStorage.getItem('lawyerInfo'));
        } catch {}
        
        const loggedInId = loggedInLawyer?._id || loggedInLawyer?.id || null;

        // Fetch notifications from API
        async function fetchNotifications() {
            try {
                const response = await fetch(`${API_BASE_URL}/notifications?lawyerId=${loggedInId}`);
                const result = await response.json();
                
                if (result.success) {
                    allNotifications = result.notifications || [];
                } else {
                    // If API fails, try localStorage
                    loadLocalNotifications();
                }
            } catch (error) {
                console.error('API fetch failed, loading local notifications:', error);
                // Load from localStorage as fallback
                loadLocalNotifications();
            }
            
            // Add demo data if no notifications exist
            if (allNotifications.length === 0) {
                allNotifications = generateDemoNotifications();
            }
            
            updateCounts();
            renderNotifications();
        }
        
        // Load notifications from localStorage
        function loadLocalNotifications() {
            try {
                const stored = localStorage.getItem(`notifications_${loggedInId}`);
                if (stored) {
                    allNotifications = JSON.parse(stored);
                    console.log('Loaded notifications from localStorage:', allNotifications);
                }
            } catch (error) {
                console.error('Failed to load local notifications:', error);
                allNotifications = [];
            }
        }

        // // Generate demo notifications
        // function generateDemoNotifications() {

        //             type: 'connection',
        //             status: 'pending',

        //             caseName: 'Smith vs. Johnson Corporation',
        //             deadline: 'Tomorrow, 5:00 PM',

        //         {

        //             title: 'Court Hearing Scheduled',

        //             caseNumber: 'FAM-2024-9012',
        //             caseName: 'Brown Family Custody',
        //             deadline: 'Today, 11:59 PM',

        //             daysLeft: 0

        //             hearingDate: 'Dec 8, 2024 at 2:30 PM',
        //             court: 'Law Office',

        // }

        // Update notification counts
        function updateCounts() {
            const counts = {
                all: allNotifications.length,
                connection: allNotifications.filter(n => n.type === 'connection' || n.type === 'accepted' || n.type === 'connection_request').length,
                deadline: allNotifications.filter(n => n.type === 'deadline' || n.type === 'reminder').length,
                hearing: allNotifications.filter(n => n.type === 'hearing').length
            };
            
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countConnection').textContent = counts.connection;
            document.getElementById('countDeadline').textContent = counts.deadline;
            document.getElementById('countHearing').textContent = counts.hearing;
        }

        // Filter notifications
        function filterNotifications(type, ev) {
            currentFilter = type;
            const evt = ev || window.event;

            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            try {
                const tab = evt && evt.target && evt.target.closest('.filter-tab');
                if (tab) tab.classList.add('active');
            } catch (e) {}

            renderNotifications();
        }

        // Render notifications
        function renderNotifications() {
            const container = document.getElementById('notificationList');
            
            let filtered = allNotifications;
            if (currentFilter !== 'all') {
                filtered = allNotifications.filter(n => 
                    n.type === currentFilter || 
                    (currentFilter === 'connection' && n.type === 'accepted')
                );
            }
            
            if (filtered.length === 0) {
                showEmptyState('No notifications in this category');
                return;
            }
            
            container.innerHTML = filtered.map(n => renderNotificationCard(n)).join('');
        }

        // Render individual notification card
        function renderNotificationCard(notification) {
            const { type, status } = notification;

            // Support backend type names like 'connection_request' and 'reminder'
            if ((type === 'connection' || type === 'connection_request') && status === 'pending') {
                return renderConnectionRequest(notification);
            } else if ((type === 'connection' || type === 'connection_request') && status === 'accepted' || type === 'accepted') {
                return renderConnectionAccepted(notification);
            } else if (type === 'deadline') {
                return renderDeadline(notification);
            } else if (type === 'hearing') {
                return renderHearing(notification);
            } else if (type === 'reminder') {
                return renderReminder(notification);
            }

            // Fallback: render a generic notification card
            return renderGeneric(notification);
        }

        // Render a generic reminder (backend 'reminder' type)
        function renderReminder(n) {
            return `
                <div class="notification-card deadline">
                    <div class="notification-time">${n.createdAt ? new Date(n.createdAt).toLocaleString() : (n.time || '')}</div>
                    <div class="notification-header">
                        <div class="notification-icon deadline">🔔</div>
                        <div class="notification-content">
                            <div class="notification-type deadline">Reminder</div>
                            <div class="notification-title">${n.title || 'Reminder'}</div>
                            <div class="notification-message">${n.message}</div>
                            <div class="notification-actions">
                                <button class="action-btn view-btn" onclick="viewCase('${n.caseNumber || ''}')">View</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderGeneric(n) {
            return `
                <div class="notification-card">
                    <div class="notification-time">${n.createdAt ? new Date(n.createdAt).toLocaleString() : (n.time || '')}</div>
                    <div class="notification-header">
                        <div class="notification-icon">🔔</div>
                        <div class="notification-content">
                            <div class="notification-type">Notification</div>
                            <div class="notification-title">${n.title || n.fromLawyerName || 'Notification'}</div>
                            <div class="notification-message">${n.message || ''}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render connection request
        function renderConnectionRequest(n) {
            return `
                <div class="notification-card connection">
                    <div class="notification-time">${n.time}</div>
                    <div class="notification-header">
                        <div class="notification-icon connection">🤝</div>
                        <div class="notification-content">
                            <div class="notification-type connection">Connection Request</div>
                            <div class="notification-title">${n.fromLawyerName}</div>
                            <div class="notification-message">${n.fromLawyerSpec || 'Legal Professional'}</div>
                            <div class="notification-details">
                                <div class="detail-item">📧 Wants to connect with you</div>
                            </div>
                            <div class="notification-actions">
                                <button class="action-btn accept-btn" onclick="respondConnection('${n._id}', 'accepted')">
                                    ✓ Accept
                                </button>
                                <button class="action-btn reject-btn" onclick="respondConnection('${n._id}', 'rejected')">
                                    ✕ Decline
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render accepted connection
        function renderConnectionAccepted(n) {
            return `
                <div class="notification-card accepted">
                    <div class="notification-time">${n.time}</div>
                    <div class="notification-header">
                        <div class="notification-icon accepted">✓</div>
                        <div class="notification-content">
                            <div class="notification-type accepted">Connection Accepted</div>
                            <div class="notification-title">${n.fromLawyerName}</div>
                            <div class="notification-message">You are now connected and can start collaborating</div>
                            <div class="status-badge accepted">
                                ✓ Connected
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render deadline notification
        function renderDeadline(n) {
            const isUrgent = n.daysLeft <= 1;
            return `
                <div class="notification-card deadline">
                    ${isUrgent ? '<div class="urgency-indicator">URGENT</div>' : ''}
                    <div class="notification-time">${n.time}</div>
                    <div class="notification-header">
                        <div class="notification-icon deadline">⏰</div>
                        <div class="notification-content">
                            <div class="notification-type deadline">Deadline Alert</div>
                            <div class="notification-title">${n.title}</div>
                            <div class="notification-message">${n.message}</div>
                            <div class="notification-details">
                                <div class="detail-item">📁 ${n.caseNumber}</div>
                                <div class="detail-item">⚖️ ${n.caseName}</div>
                                <div class="detail-item">📅 Due: ${n.deadline}</div>
                            </div>
                            <div class="notification-actions">
                                <button class="action-btn view-btn" onclick="viewCase('${n.caseNumber}')">
                                    View Case Details
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render hearing notification
        function renderHearing(n) {
            return `
                <div class="notification-card hearing">
                    <div class="notification-time">${n.time}</div>
                    <div class="notification-header">
                        <div class="notification-icon hearing">⚖️</div>
                        <div class="notification-content">
                            <div class="notification-type hearing">Hearing Reminder</div>
                            <div class="notification-title">${n.title}</div>
                            <div class="notification-message">${n.message}</div>
                            <div class="notification-details">
                                <div class="detail-item">📁 ${n.caseNumber}</div>
                                <div class="detail-item">⚖️ ${n.caseName}</div>
                                <div class="detail-item">📅 ${n.hearingDate}</div>
                                <div class="detail-item">📍 ${n.court}</div>
                            </div>
                            <div class="notification-actions">
                                <button class="action-btn view-btn" onclick="viewCase('${n.caseNumber}')">
                                    View Case Details
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Show empty state
        function showEmptyState(message) {
            const container = document.getElementById('notificationList');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🔔</div>
                    <div class="empty-title">No Notifications</div>
                    <div class="empty-message">${message}</div>
                </div>
            `;
        }

        // Respond to connection request
        async function respondConnection(notificationId, response) {
            try {
                const res = await fetch(`${API_BASE_URL}/notifications/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ notificationId, response })
                });
                const result = await res.json();
                
                if (result.success) {
                    fetchNotifications();
                } else {
                    // Update locally if API fails
                    updateNotificationLocally(notificationId, response);
                }
            } catch (error) {
                console.error('API response failed, updating locally:', error);
                // Update notification status locally
                updateNotificationLocally(notificationId, response);
            }
        }
        
        // Update notification locally
        function updateNotificationLocally(notificationId, response) {
            const notification = allNotifications.find(n => n._id === notificationId);
            if (notification) {
                notification.status = response;
                if (response === 'accepted') {
                    notification.type = 'accepted';
                    notification.message = `You are now connected with ${notification.fromLawyerName}`;
                }
                
                // Save to localStorage
                try {
                    localStorage.setItem(`notifications_${loggedInId}`, JSON.stringify(allNotifications));
                } catch (error) {
                    console.error('Failed to save to localStorage:', error);
                }
                
                renderNotifications();
                alert(`Connection request ${response}!`);
            }
        }

        // View case details
        function viewCase(caseNumber) {
            alert(`Opening case details for ${caseNumber}...`);
            // Implement navigation to case details page
            // window.location.href = `case-details.html?case=${caseNumber}`;
        }

        // Initial load
        fetchNotifications();
    </script>
