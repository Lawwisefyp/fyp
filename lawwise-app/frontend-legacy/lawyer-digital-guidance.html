    <script>
        function searchTopic(topic) {
            document.getElementById('searchInput').value = topic;
            openTopicPage(topic);
        }

        function openTopicPage(topic) {
            // Hide main content
            document.querySelector('.sidebar').style.display = 'none';
            document.querySelector('.filter-tabs').style.display = 'none';
            document.getElementById('contentGrid').style.display = 'none';
            
            // Update header
            const header = document.querySelector('.header');
            header.innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <button onclick="goBack()" style="background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: 500;">← Back to All Topics</button>
                    <h1 style="margin: 0; font-size: 2.5rem; color: #2c3e50; background: linear-gradient(45deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${topic} Resources</h1>
                </div>
                <p style="font-size: 1.1rem; color: #666; margin-bottom: 20px;">Comprehensive video resources and tutorials for ${topic.toLowerCase()}</p>
                <div class="search-container">
                    <div class="search-icon">🔍</div>
                    <input type="text" class="search-box" placeholder="Search within ${topic}..." id="topicSearchInput">
                </div>
            `;
            
            // Create topic-specific content
            createTopicContent(topic);
        }

        function createTopicContent(topic) {
            const container = document.querySelector('.container');
            
            // Create topic page content
            const topicContent = document.createElement('div');
            topicContent.id = 'topicContent';
            topicContent.innerHTML = getTopicSpecificContent(topic);
            
            container.appendChild(topicContent);
        }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Guidance - Legal Education</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

        .thumbnail-overlay {

            background: linear-gradient(135deg, #E0F2FE 0%, #BAE6FD 50%, #7DD3FC 100%);
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <div class="bg-white/90 backdrop-blur-sm shadow-lg border-b border-sky-200">
        <div class="max-w-7xl mx-auto px-4 py-6">

            <!-- Search Bar -->
            <div class="relative">
                <svg class="absolute left-3 top-3 text-sky-400" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Search legal topics, cases, or procedures..."
                    class="w-full pl-10 pr-4 py-3 border border-sky-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 bg-white/80"
                />
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Popular Legal Topics -->
        <div class="mb-8">
            <h2 class="text-xl font-bold text-sky-900 mb-4">Popular Legal Topics</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="topicsGrid">
                <!-- Topics will be inserted here -->
            </div>
        </div>

        <!-- Category Filter -->
        <div class="mb-6">
            <div class="flex gap-2 overflow-x-auto pb-2" id="categoryFilter">
                <!-- Categories will be inserted here -->
            </div>
        </div>

        <!-- Current Category Display -->
        <div id="categoryTitle" class="mb-4 hidden">
            <h2 class="text-2xl font-bold text-sky-900">
                <span id="currentCategory"></span>
                <button id="backButton" class="ml-4 text-sm text-sky-600 hover:text-sky-700 font-normal">
                    ← Back to All Videos

            </h2>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-sky-600"></div>
            <p class="mt-4 text-sky-700">Loading videos...</p>
        </div>

        <!-- Videos Grid -->
        <div id="videosGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Videos will be inserted here -->
        </div>

        <!-- No Videos State -->
        <div id="noVideosState" class="text-center py-12 bg-white/80 rounded-lg border border-sky-200 shadow-lg hidden">
            <p class="text-sky-700 text-lg">No videos found matching your search.</p>
            <button id="clearFilters" class="mt-4 text-sky-600 hover:text-sky-700 font-medium">
                Clear filters
            </button>
        </div>
    </div>

    <script>
        // Video links by category - JUST ADD YOUTUBE URLS HERE!
        const videoLinks = {
            'Court Procedure': [
                'https://youtu.be/HIUhVfooVZ4?si=Duyj4wn6XBu3RkGr',
                'https://youtu.be/ZuKsY8B6OZI?si=2fbe3eBz35-7XehG',
                'https://youtu.be/o_TaCEX8NYw?si=h-nBMcn6wMla1FSR',
                'https://youtu.be/gQUxAiVhzF4?si=4bGkInmAmZ8FPAEm'
            ],
            'Civil Law Practice': [
                'https://youtu.be/dOsBFGDoSAk?si=S2G7_IX00SN6rC55',
                'https://youtu.be/O3G1iimBaPc?si=AirIpGfYvusDjTse',
                'https://youtu.be/lzc-UCeecQQ?si=GcMqw4fLQjBMiz41',
                'https://youtu.be/EuJrCRzz3SE?si=UIEt610cSvWXn7_V'
            ],
            'Legal Drafting': [
                'https://youtu.be/BpJHQX1acfI?si=0shLtpCQ68Ye2fMW',
                'https://youtu.be/MiSlDpDQxbk?si=vX4_rF4G9Zo4Tkkb'
            ],
            'Civil Litigation': [
                'https://www.youtube.com/watch?v=Rb8JlfYICJ4',
                'https://www.youtube.com/watch?v=yNzKR0d0fEw'
            ],
            'Corporate Law': [
                'https://www.youtube.com/watch?v=mGVJIvH8YYw',
                'https://www.youtube.com/watch?v=kXVj_2XP1dU'
            ],
            'Family Law': [
                'https://www.youtube.com/watch?v=LZqi4doRzD4',
                'https://www.youtube.com/watch?v=P5ewYjWVZSc'
            ]
        };

        const legalTopics = [
            { name: 'Court Procedure', count: 4 },
            { name: 'Civil Law Practice', count: 4 },
            { name: 'Legal Drafting', count: 2 },
            { name: 'Civil Litigation', count: 2 },
            { name: 'Corporate Law', count: 2 },
            { name: 'Family Law', count: 2 },
            { name: 'Property Law', count: 15 },
            { name: 'Evidence Law', count: 21 }
        ];

        const categories = ['All Videos', 'Recent', 'Trending', 'Beginner', 'Advanced', 'Case Studies'];
        
        let allVideos = [];
        let filteredVideos = [];
        let selectedCategory = 'All Videos';

        // Extract video ID from YouTube URL (supports multiple formats)
        function getVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s?]+)/,
                /youtube\.com\/watch\?.*v=([^&\s]+)/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        // Fetch video info using YouTube oEmbed API (no auth required!)
        async function fetchVideoInfo(url, category) {
            const videoId = getVideoId(url);
            if (!videoId) {
                console.error('Invalid YouTube URL:', url);
                return null;
            }

            try {
                const oEmbedUrl = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`;
                const response = await fetch(oEmbedUrl);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    return {
                        id: videoId,
                        title: data.title || 'YouTube Video',
                        channelTitle: data.author_name || 'Unknown Channel',
                        thumbnail: data.thumbnail_url || `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`,
                        description: `Watch this educational video on ${category}`,
                        category: category,
                        url: `https://www.youtube.com/watch?v=${videoId}`,
                        viewCount: Math.floor(Math.random() * 500000) + 50000,
                        duration: 'PT45M',
                        publishedAt: new Date(Date.now() - Math.random() * 180 * 24 * 60 * 60 * 1000).toISOString()
                    };
                }
            } catch (error) {
                console.log('oEmbed failed, using direct thumbnail URL');
            }

            return {
                id: videoId,
                title: 'Legal Education Video',
                channelTitle: 'YouTube Channel',
                thumbnail: `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`,
                thumbnailFallback: `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`,
                description: `Educational content on ${category}`,
                category: category,
                url: `https://www.youtube.com/watch?v=${videoId}`,
                viewCount: Math.floor(Math.random() * 500000) + 50000,
                duration: 'PT45M',
                publishedAt: new Date(Date.now() - Math.random() * 180 * 24 * 60 * 60 * 1000).toISOString()
            };
        }

        // Format view count
        function formatViews(count) {
            if (count >= 1000000) return `${(count / 1000000).toFixed(1)}M`;
            if (count >= 1000) return `${(count / 1000).toFixed(1)}K`;
            return count.toString();
        }

        // Format duration
        function formatDuration(duration) {
            const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
            if (!match) return '0:00';
            
            const hours = (match[1] || '').replace('H', '');
            const minutes = (match[2] || '0').replace('M', '');
            const seconds = (match[3] || '0').replace('S', '');
            
            if (hours) return `${hours}:${minutes.padStart(2, '0')}:${seconds.padStart(2, '0')}`;
            return `${minutes}:${seconds.padStart(2, '0')}`;
        }

        // Calculate time ago
        function getTimeAgo(publishedAt) {
            const now = new Date();
            const published = new Date(publishedAt);
            const diffTime = Math.abs(now - published);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 1) return 'Today';
            if (diffDays === 1) return '1 day ago';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} week${Math.floor(diffDays / 7) > 1 ? 's' : ''} ago`;
            if (diffDays < 365) return `${Math.floor(diffDays / 30)} month${Math.floor(diffDays / 30) > 1 ? 's' : ''} ago`;
            return `${Math.floor(diffDays / 365)} year${Math.floor(diffDays / 365) > 1 ? 's' : ''} ago`;
        }

        // Render topics grid
        function renderTopics() {
            const grid = document.getElementById('topicsGrid');
            grid.innerHTML = legalTopics.map(topic => `
                <button 
                    onclick="selectTopic('${topic.name}')"
                    class="bg-white/80 backdrop-blur-sm p-4 rounded-lg shadow-md hover:shadow-xl transition-all border-2 ${selectedCategory === topic.name ? 'border-sky-500 bg-sky-50/90' : 'border-sky-200'} text-left"
                >
                    <div class="font-semibold text-sky-900">${topic.name}</div>
                    <div class="text-sm text-sky-600 mt-1">${topic.count} videos</div>
                </button>
            `).join('');
        }

        // Render category filter
        function renderCategories() {
            const filter = document.getElementById('categoryFilter');
            filter.innerHTML = categories.map(category => `
                <button 
                    onclick="selectCategory('${category}')"
                    class="px-4 py-2 rounded-full whitespace-nowrap transition-all ${selectedCategory === category ? 'bg-sky-600 text-white shadow-lg' : 'bg-white/80 backdrop-blur-sm text-sky-700 hover:bg-sky-50 border border-sky-200'}"
                >
                    ${category}
                </button>
            `).join('');
        }

        // Render videos
        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            const loading = document.getElementById('loadingState');
            const noVideos = document.getElementById('noVideosState');
            const categoryTitle = document.getElementById('categoryTitle');
            const currentCategory = document.getElementById('currentCategory');

            if (filteredVideos.length === 0) {
                grid.classList.add('hidden');
                loading.classList.add('hidden');
                noVideos.classList.remove('hidden');
                return;
            }

            loading.classList.add('hidden');
            noVideos.classList.add('hidden');
            grid.classList.remove('hidden');

            if (selectedCategory !== 'All Videos') {
                categoryTitle.classList.remove('hidden');
                currentCategory.textContent = selectedCategory;
            } else {
                categoryTitle.classList.add('hidden');
            }

            grid.innerHTML = filteredVideos.map(video => `
                <div class="video-card bg-white/80 backdrop-blur-sm rounded-lg shadow-lg hover:shadow-2xl transition-all overflow-hidden border border-sky-200">
                    <!-- Thumbnail -->
                    <div class="relative group cursor-pointer" onclick="window.open('${video.url}', '_blank')">
                        <img 
                            src="${video.thumbnail}" 
                            alt="${video.title}"
                            class="w-full aspect-video object-cover"
                            onerror="this.onerror=null; this.src='${video.thumbnailFallback || 'https://i.ytimg.com/vi/' + video.id + '/hqdefault.jpg'}'"
                        />
                        <div class="thumbnail-overlay absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-30 transition-all flex items-center justify-center opacity-0">
                            <svg class="text-white" width="48" height="48" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>
                        <div class="absolute bottom-2 right-2 bg-black bg-opacity-80 text-white text-xs px-2 py-1 rounded">
                            ${formatDuration(video.duration)}
                        </div>
                        <div class="absolute top-2 left-2 bg-sky-600 text-white text-xs px-2 py-1 rounded-full shadow-lg">
                            ${video.category}
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="p-4">
                        <h3 class="font-semibold text-sky-900 mb-2 line-clamp-2 hover:text-sky-600 cursor-pointer" onclick="window.open('${video.url}', '_blank')">
                            ${video.title}
                        </h3>
                        
                        <div class="text-sm text-sky-700 mb-3">${video.channelTitle}</div>

                        <div class="flex items-center gap-4 text-xs text-sky-600 mb-3 flex-wrap">
                            <div class="flex items-center gap-1">
                                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M12 6v6l4 2"></path>
                                </svg>
                                <span>${formatDuration(video.duration)}</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <span>${formatViews(video.viewCount)} views</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span>${getTimeAgo(video.publishedAt)}</span>
                            </div>
                        </div>

                        <p class="text-sm text-sky-700 line-clamp-2 mb-4">
                            ${video.description}
                        </p>

                        <div class="flex gap-2">
                            <button 
                                onclick="window.open('${video.url}', '_blank')"
                                class="flex-1 bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg transition-all font-medium text-sm flex items-center justify-center gap-2 shadow-md"
                            >
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                Watch Now
                            </button>
                            <button class="px-4 py-2 border border-sky-300 rounded-lg hover:bg-sky-50 transition-all">
                                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Select topic
        function selectTopic(topicName) {
            selectedCategory = topicName;
            filterVideos();
            renderTopics();
            renderCategories();
        }

        // Select category
        function selectCategory(category) {
            selectedCategory = category;
            filterVideos();
            renderCategories();
            renderTopics();
        }

        // Filter videos
        function filterVideos() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            
            filteredVideos = allVideos.filter(video => {
                const matchesSearch = !searchQuery || 
                    video.title.toLowerCase().includes(searchQuery) ||
                    video.channelTitle.toLowerCase().includes(searchQuery) ||
                    video.description.toLowerCase().includes(searchQuery);
                
                const matchesCategory = selectedCategory === 'All Videos' || 
                    selectedCategory === 'Recent' || 
                    selectedCategory === 'Trending' ||
                    selectedCategory === 'Beginner' ||
                    selectedCategory === 'Advanced' ||
                    selectedCategory === 'Case Studies' ||
                    video.category === selectedCategory;
                
                return matchesSearch && matchesCategory;
            });

            if (selectedCategory === 'Recent') {
                filteredVideos.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
            } else if (selectedCategory === 'Trending') {
                filteredVideos.sort((a, b) => b.viewCount - a.viewCount);
            }

            renderVideos();
        }

        // Initialize
        async function init() {
            renderTopics();
            renderCategories();

            const allLinks = Object.entries(videoLinks).flatMap(([category, links]) => 
                links.map(link => ({ category, link }))
            );

            for (const { category, link } of allLinks) {
                const videoInfo = await fetchVideoInfo(link, category);
                if (videoInfo) {
                    allVideos.push(videoInfo);
                    filterVideos();
                }
            }
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterVideos);
        document.getElementById('backButton').addEventListener('click', () => selectCategory('All Videos'));
        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            selectCategory('All Videos');
        });

        init();
    </script>
